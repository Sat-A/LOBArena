name: LOBArena Focused Tests

on:
  pull_request:
    paths:
      - "evaluate/**"
      - "leaderboard/**"
      - "config/evaluation_configs/**"
      - "tests/**"
      - ".github/workflows/lobarena-focused-tests.yml"
  push:
    branches: [main]
    paths:
      - "evaluate/**"
      - "leaderboard/**"
      - "config/evaluation_configs/**"
      - "tests/**"
      - ".github/workflows/lobarena-focused-tests.yml"
  workflow_dispatch:

jobs:
  focused-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: handoff-and-batch
            pytest_args: "tests/test_policy_handoff.py tests/test_batch_evaluation.py tests/test_phase2_configs.py tests/test_runtime_and_args.py tests/test_checkpoint_loader_errors.py"
          - name: leaderboard-and-adversarial
            pytest_args: "tests/test_leaderboard_aggregator.py tests/test_adversarial_registry.py tests/test_adversarial_tournament.py"
          - name: core-pipeline-guardrails-metrics
            pytest_args: "tests/test_guardrails.py tests/test_metrics.py tests/test_loss_policy.py"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install focused test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy

      - name: Run ${{ matrix.suite.name }}
        env:
          PYTHONPATH: ${{ github.workspace }}/..
        run: |
          python -m pytest -q ${{ matrix.suite.pytest_args }}
